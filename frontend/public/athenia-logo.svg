<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo base con gradiente -->
  <circle cx="20" cy="20" r="19" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="1.5"/>
  
  <!-- Cabeza estilizada (silueta de diosa/IA) -->
  <path d="M20 8 C15 8, 12 12, 12 16 C12 18, 13 20, 14 21 L14 26 C14 28, 16 30, 20 30 C24 30, 26 28, 26 26 L26 21 C27 20, 28 18, 28 16 C28 12, 25 8, 20 8 Z" fill="url(#gradient3)" opacity="0.9"/>
  
  <!-- Circuito neural (conectividad) -->
  <circle cx="15" cy="16" r="1.5" fill="#0099FF"/>
  <circle cx="25" cy="16" r="1.5" fill="#0099FF"/>
  <circle cx="20" cy="13" r="1.5" fill="#00BFFF"/>
  
  <!-- Líneas de conexión -->
  <line x1="15" y1="16" x2="20" y2="13" stroke="#0099FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="25" y1="16" x2="20" y2="13" stroke="#0099FF" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Puntos de datos (efecto IA) -->
  <circle cx="12" cy="22" r="1" fill="#00BFFF" opacity="0.7"/>
  <circle cx="28" cy="22" r="1" fill="#00BFFF" opacity="0.7"/>
  <circle cx="20" cy="25" r="1" fill="#0099FF" opacity="0.8"/>
  
  <!-- Corona/diadema (elemento diosa) -->
  <path d="M14 12 L16 10 L18 11 L20 9 L22 11 L24 10 L26 12" stroke="#00BFFF" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Definiciones de gradientes -->
  <defs>
    <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002873"/>
      <stop offset="50%" stop-color="#003DA5"/>
      <stop offset="100%" stop-color="#0055D4"/>
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0099FF"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
    
    <linearGradient id="gradient3" x1="20" y1="8" x2="20" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0099FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#003DA5" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
</svg>
